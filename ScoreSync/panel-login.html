<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>ScoreSync: An Automated Event Scoring and Tabulation System for School Events</title>
     <link rel="stylesheet" href="admin-panel-login-style.css">
     <script src="" defer></script>
</head>
<body>

     <main class="login-container">
          
          <section class="left-section">
               <h1 class="logo-title">ScoreSync</h1>
               <p class="tagline">An Automated Event Scoring and Tabulation System for School Events</p>
          </section>

          <section class="right-section">
               <form class="login-form">
                    <h2>Judges Login Portal</h2>
                    
                    <div class="input-group">
                         <label for="username">Username</label>
                         <input type="text" id="username" required>
                    </div>

                    <div class="input-group">
                         <label for="password">Password</label>
                         <input type="password" id="password" required>
                    </div>

                    <button type="submit" class="login-btn">Sign In</button>
               </form>
          </section>

     </main>

</body>
</html>
