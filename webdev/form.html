<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Mock Form</title>

     <style>
          .split-login{
               display: flex;
               min-height: 100vh;
               width: 100%;
          }
          .left-side, .right-side{
               flex: 1;
               display: flex;
               align-items: center;
               justify-content: center;
               padding: 40px;
          }
          left-side{
               background: #fff;
          }
          .right-side{
               background: linear-gradient(135deg, #4f46e5, #7c3aed);
               color: white;
               text-align: center;
               flex-direction: column;
          }
          .right-side img{
               width: 120px;
               margin-bottom: 20px;
          }
          .login-form{
               width: 100%;
               max-width: 360px;
          }
          .login-form input, .login-form button{
               width: 100%;
               padding: 12px;
               margin-top: 8px;
               border-radius: 8px;
               border: 1px solid #ddd;
          }
          .login-form button{
               background: #4f46e5;
               color: #fff;
               border: none;
               margin-top: 16px;
               cursor: pointer;
          }
     </style>
</head>
<body>
     <div class="split-login">
          <div class="left-side">
               <form action="login" class="login-form">
                    <h2>Welcome Back</h2>
                    <label>Email:</label>
                    <input type="email" name="email" id="email" placeholder="yourmail@email.com" required>

                    <label>Password:</label>
                    <input type="password" name="passsword" id="password" placeholder="type password" required>

                    <button type="button">Log in</button>
               
                    <p>Forgot password? Click <a href="#">here.</a></p>
               </form>
          </div>

          <div class="right-side">
               <img src="#" alt="Company Logo">
               <h1>Cronus Media Co.</h1>
               <p>Build things faster with us.</p>
          </div>
     </div>
</body>
</html>
